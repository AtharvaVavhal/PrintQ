[databases]
printq = host=127.0.0.1 port=5432 dbname=printq

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction          ; Best for web APIs
max_client_conn = 200
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30